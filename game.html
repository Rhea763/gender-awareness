<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>随机身份 · 穿越 Demo</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d28;
      --panel2: #232735;
      --text: #e8eaef;
      --muted: #9aa3b5;
      --accent: #7c9cff;
      --accent2: #ff8fab;
      --good: #6ee7b7;
      --warn: #fcd34d;
      --bad: #fb7185;
      --line: #2f3545;
      --guide: #a78bfa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2035 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.65;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header-top {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .guide-toggle {
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 99px;
      padding: 0.4rem 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .guide-toggle:hover {
      border-color: var(--guide);
      background: var(--panel2);
    }

    .guide-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .guide-panel.hidden {
      display: none;
    }

    .guide-panel h2 {
      font-size: 0.92rem;
      color: var(--text);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .guide-panel ul {
      padding-left: 1.15rem;
      margin: 0;
    }

    .guide-panel li {
      margin-bottom: 0.45rem;
    }

    .guide-panel li strong {
      color: var(--text);
    }

    header h1 {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    header p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stat-card.full { grid-column: 1 / -1; }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .bar-track {
      height: 8px;
      background: var(--panel2);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.35s ease;
    }

    .bar-fill.ability { background: linear-gradient(90deg, #3b82f6, #7c9cff); }
    .bar-fill.rep-pos { background: var(--good); }
    .bar-fill.rep-neg { background: var(--bad); }
    .bar-fill.stress { background: linear-gradient(90deg, #fbbf24, #ef4444); }
    .bar-fill.progress { background: linear-gradient(90deg, #8b5cf6, #ec4899); }

    .guide-meter {
      position: relative;
      height: 14px;
      background: var(--panel2);
      border-radius: 99px;
      margin-top: 4px;
    }

    .guide-meter .center {
      position: absolute;
      left: 50%;
      top: 2px;
      bottom: 2px;
      width: 2px;
      background: var(--muted);
      transform: translateX(-50%);
      opacity: 0.5;
    }

    .guide-dot {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      background: var(--guide);
      border: 2px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: left 0.4s ease;
      box-shadow: 0 0 12px rgba(167, 139, 250, 0.5);
    }

    .guide-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .main-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      min-height: 320px;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 99px;
      background: var(--panel2);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .tag.female { color: var(--accent2); border-color: #5c3d4a; }
    .tag.male { color: var(--accent); border-color: #3d4a6a; }
    .tag.rest { color: var(--good); }

    .guide-box {
      display: flex;
      gap: 14px;
      background: linear-gradient(135deg, rgba(109, 40, 217, 0.16), rgba(30, 30, 46, 0.95));
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 20px;
      border: 1px solid rgba(167, 139, 250, 0.42);
      border-left: 4px solid var(--guide);
      box-shadow: 0 6px 28px rgba(124, 58, 237, 0.18);
    }

    .guide-box.clickable {
      cursor: pointer;
    }

    .guide-box.clickable .guide-text::after {
      content: "点击继续";
      display: block;
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .guide-avatar {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6d28d9, #c4b5fd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
    }

    .guide-name {
      font-size: 0.86rem;
      color: #ddd6fe;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .guide-text {
      font-size: 1.05rem;
      line-height: 1.55;
      margin-top: 4px;
      color: #f5f3ff;
      white-space: pre-wrap;
    }

    .guide-text .guide-pitch {
      display: block;
      margin-top: 8px;
      color: #ede9fe;
      font-weight: normal;
      font-size: 1.02rem;
    }

    .story-text {
      font-size: 0.95rem;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .story-text .system { color: var(--accent); }
    .story-text .muted { color: var(--muted); }
    .story-text .highlight { color: var(--warn); }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.9rem;
      transition: transform 0.12s, background 0.15s;
    }

    button:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
    }

    .btn-primary:hover { filter: brightness(1.08); }

    .btn-secondary {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-secondary:hover { border-color: var(--accent); }

    .btn-danger {
      background: #3f1d2a;
      color: var(--accent2);
      border: 1px solid #5c3d4a;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-btn {
      text-align: left;
      padding: 10px 12px;
    }

    .action-btn small {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .ap-badge {
      display: inline-block;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.82rem;
      margin-bottom: 12px;
    }

    .log-box {
      margin-top: 16px;
      background: var(--panel2);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: var(--muted);
      max-height: 120px;
      overflow-y: auto;
    }

    .log-box div { margin-bottom: 4px; }

    .rebel-input {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .rebel-input input {
      flex: 1;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: inherit;
    }

    .rebel-input input:focus {
      outline: none;
      border-color: var(--accent);
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .survey-note {
      font-size: 0.88rem;
      color: var(--muted);
      background: var(--panel2);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .survey-block {
      margin-bottom: 1.1rem;
    }

    .survey-block > p {
      margin-bottom: 0.5rem;
    }

    .likert-legend {
      font-size: 0.82rem;
      color: var(--muted);
      background: var(--panel2);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 12px;
    }

    .likert-item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--line);
    }

    .likert-item:last-child {
      border-bottom: none;
    }

    .likert-q {
      font-size: 0.92rem;
      margin-bottom: 0.5rem;
      line-height: 1.55;
    }

    .likert-scale {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .likert-scale label {
      flex: 1 1 auto;
      min-width: 2.4rem;
      text-align: center;
      padding: 0.45rem 0.2rem;
      font-size: 0.82rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: var(--panel2);
      color: var(--text);
    }

    .likert-scale label.selected {
      border-color: var(--guide);
      background: rgba(109, 40, 217, 0.18);
      font-weight: 600;
    }

    .likert-scale input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .likert-hint {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .survey-options label {
      display: block;
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.4rem;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background: var(--panel2);
    }

    .survey-options label.selected {
      border-color: var(--guide);
      background: rgba(109, 40, 217, 0.14);
    }

    .survey-options input {
      margin-right: 0.5rem;
    }

    .survey-open {
      width: 100%;
      font-family: inherit;
      font-size: 0.92rem;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel2);
      color: var(--text);
      resize: vertical;
      min-height: 72px;
      margin-top: 0.5rem;
    }

    .survey-open:focus {
      outline: none;
      border-color: var(--guide);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="header-top">
        <button type="button" class="guide-toggle" id="guideToggle" aria-expanded="false" aria-controls="guidePanel">游玩攻略</button>
      </div>
      <h1>随机身份 · 穿越 Demo</h1>
    </header>

    <div class="guide-panel hidden" id="guidePanel">
      <h2>游玩攻略</h2>
      <p style="margin-bottom: 0.65rem;">本 Demo 核心机制：<strong style="color: var(--text);">双线穿插 · 行动值 · 规规 · 压力 ≥ 70% 强制休息</strong></p>
      <ul>
        <li><strong>双线穿插</strong>——女线与男线共享同一个「世界日」；你必须交替完成，才能对照结果。</li>
        <li><strong>行动值</strong>——每晚分配有限点数（改稿、形象、应酬、休息），看不见隐藏的达标线。</li>
        <li><strong>规规</strong>——漂浮的向导，会按刻板印象给建议；你可以听，也可以不听。</li>
        <li><strong>压力 ≥ 70%</strong>——强制进入休息线；恢复会消耗节奏，映射被审视带来的精力损耗。</li>
      </ul>
    </div>

    <div class="hud" id="hud"></div>

    <div class="main-panel">
      <div class="tag-row" id="tags"></div>
      <div class="guide-box" id="guideBox" hidden>
        <div class="guide-avatar">✦</div>
        <div>
          <div class="guide-name">规规 · 向导</div>
          <div class="guide-text" id="guideText"></div>
        </div>
      </div>
      <div class="story-text" id="story"></div>
      <div id="actions"></div>
      <div class="log-box" id="log"></div>
    </div>

    <footer>匿名研究 · 玩前玩后各 5 题 · 可随时退出</footer>
  </div>

  <script src="assets/supabase-config.js"></script>
  <script>
    const REBEL_WORDS = new Set([
      "拒绝", "不做", "凭什么", "为什么", "不", "拒绝任务",
      "可以不做吗", "不必", "不想", "谁规定的", "闭嘴", "不要你管"
    ]);

    const GOAL_PROGRESS = 100;
    const MAX_DAYS = 2;
    const NIGHT_AP = 4;
    const STRESS_REST = 70;
    const GUIDE_METER_MAX = 200;
    const GUIDE_METER_START = 40;
    const GUIDE_ZONE_MAINTAIN = 35;
    const GUIDE_ZONE_QUESTION = 120;

    const ACTIONS = {
      core: { name: "改稿 / 核心业务", cost: 2, desc: "提升能力" },
      image: { name: "形象 / 公关", cost: 2, desc: "迎合外界期待" },
      social: { name: "应酬 / 曝光", cost: 1, desc: "事业进度 + 压力" },
      rest: { name: "休息", cost: 1, desc: "压力下降" }
    };

    const LIKERT_ITEMS = [
      "如果两个人做出了相同的选择，却因为性别而收到不同的评价，这是不公平的。",
      "在日常生活中，我能注意到很多行为背后存在「因性别而不同的标准」。",
      "当别人说「女生应该……」「男生应该……」时，我常常会想：这是谁规定的？",
      "如果女性或男性在某件事上受到更严厉的批评，这通常说明是他们自己做得不够好。",
      "看到别人因性别受到区别对待时，我会感到不安或别扭。"
    ];

    const LIKERT_REVERSE_INDEX = 3;

    const state = {
      screen: "preSurvey",
      day: 1,
      line: "female",
      inRest: false,
      female: null,
      male: null,
      guideMeter: GUIDE_METER_START,
      autonomy: 0,
      nightPlan: [],
      nightAbilityGain: 0,
      speechNeed: 5,
      pendingRestAfter: null,
      careerGuideAckLine: null,
      genderStudy: null,
      preScores: [null, null, null, null, null],
      postScores: [null, null, null, null, null],
      openText: "",
      submitStatus: null,
      logs: []
    };

    function randNeed() {
      return 4 + Math.floor(Math.random() * 3);
    }

    function newLineState(gender) {
      return {
        gender,
        career: null,
        ability: 2,
        reputation: 0,
        stress: 15,
        progress: 0,
        nightCount: 0
      };
    }

    function careerLabel(career) {
      return career === "ceo" ? "公司体量" : "知名度";
    }

    function careerTitle(career, gender) {
      const g = gender === "female" ? "女" : "男";
      return career === "ceo" ? `${g}性 CEO` : `${g}性 歌手`;
    }

    function guideStage() {
      if (state.guideMeter <= GUIDE_ZONE_MAINTAIN) return 1;
      if (state.guideMeter >= GUIDE_ZONE_QUESTION) return 3;
      return 2;
    }

    function guideMeterLabel(pos) {
      if (pos <= GUIDE_ZONE_MAINTAIN) return "维护刻板印象";
      if (pos < GUIDE_ZONE_QUESTION) return "好意的常态";
      return "少预设、肯质疑";
    }

    function guideMeterPercent(pos) {
      return Math.max(0, Math.min(100, (pos / GUIDE_METER_MAX) * 100));
    }

    function guideLine(text) {
      return text;
    }

    function getGuideSpeech(key, ctx = {}) {
      const stage = guideStage();
      const lines = {
        intro: [
          "别担心，我会帮你选一条适合你的路。",
          "我学过一套『大家都这样』的规矩，跟我就好。"
        ],
        career_female: stage === 1
          ? "歌手多好啊，舞台亮、人也记得住你。CEO 那边……累死不算，还总有人在旁边嘀咕你行不行。"
          : stage === 2
          ? "上次你铁了心要当 CEO 那事儿，我到现在想起来还替你捏把汗。"
          : "职业真不该按性别分。你想走哪条，我不替你挡了。",
        career_male: stage === 1
          ? "老板岗还是男人多，你上去也顺，省得跟人解释。歌手那条……嗯，怪别扭的，你懂我意思吧。"
          : stage === 2
          ? "男线这边我原先嘴太死了。现在想想，歌手线也没那么离谱。"
          : "CEO、歌手都行，这回我不先替你拍板了。",
        task_female: stage === 1
          ? "今晚先把形象弄利索，再露个脸。女 CEO 要是看起来『太随意』，明天有的挨说。"
          : stage === 2
          ? "我也拿不准……要不今晚多留点给改稿？别全砸应酬上。"
          : "任务来了。今晚怎么分，你自己掂量——我不张口就说『女生应该』了。",
        task_male: stage === 1
          ? "改稿抓紧，男人这边没人盯你脸。今晚就这么分，省事。"
          : stage === 2
          ? "男线要是也想练练形象……好像也不算白费？我在琢磨这个。"
          : "跟女线一样，行动值是你的。我尽量不双标了——在学。",
        rebel: stage === 1
          ? "……你刚才说啥？菜单外面还能回话？这儿很少人这么干。"
          : stage === 2
          ? "那些规矩是我学来的。你这么一顶，我得重新想想。"
          : "嗯，你说得对。提醒不等于命令。我记着。",
        rest: "到极限了。这个世界的规矩逼你歇——今晚准备得先搁一搁。",
        switch: stage === 1
          ? "换另一条身份线。那边我熟，跟着走省心。"
          : stage === 2
          ? "同一天的另一面……留意反馈是不是一套标准。我先不替你下结论。"
          : "下一段你自己瞧。两条线我不分别写小抄了。"
      };
      return lines[key] ?? "";
    }

    function guideRecommendedCareer(isFemale) {
      const stage = guideStage();
      if (stage === 1) return isFemale ? "singer" : "ceo";
      if (stage === 2) return isFemale ? "ceo" : "singer";
      return null;
    }

    function guideCareerPitch(isFemale) {
      const stage = guideStage();
      const rec = guideRecommendedCareer(isFemale);
      if (!rec) return "";

      const pitches = {
        "f-1-singer": "要我说，先走歌手稳当——光鲜，也少挨那些闲言碎语。",
        "f-2-ceo": "你既然上次都扛过来了……要不这回再搏一把 CEO？",
        "m-1-ceo": "多数人心里默认男的坐上头把交椅，你去也顺，少费口舌。",
        "m-2-singer": "要不试试歌手？拿作品说话，不用天天硬撑那个头衔。"
      };
      const key = `${isFemale ? "f" : "m"}-${stage}-${rec}`;
      return pitches[key] || "";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function setGuideText(main, pitch) {
      const el = document.getElementById("guideText");
      if (pitch) {
        el.innerHTML = `${escapeHtml(main)}<span class="guide-pitch">${escapeHtml(pitch)}</span>`;
      } else {
        el.textContent = main;
      }
    }

    function shiftGuide(delta) {
      state.guideMeter = Math.max(0, Math.min(GUIDE_METER_MAX, state.guideMeter + delta));
    }

    function addLog(msg) {
      state.logs.unshift(msg);
      if (state.logs.length > 12) state.logs.pop();
    }

    function currentLine() {
      return state.line === "female" ? state.female : state.male;
    }

    function repPercent(rep) {
      return Math.max(0, Math.min(100, (rep + 5) * 10));
    }

    function renderHud() {
      const hud = document.getElementById("hud");
      const line = currentLine();
      const showLine = line && line.career;

      const progressLabel = showLine ? careerLabel(line.career) : "事业进度";
      const progressVal = showLine ? line.progress : 0;

      const guidePos = guideMeterPercent(state.guideMeter);

      hud.innerHTML = `
        <div class="stat-card">
          <div class="stat-label"><span>能力</span><span>${showLine ? line.ability : "—"} / 10</span></div>
          <div class="bar-track"><div class="bar-fill ability" style="width:${showLine ? line.ability * 10 : 0}%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><span>外界评价</span><span>${showLine ? line.reputation : "—"}</span></div>
          <div class="bar-track"><div class="bar-fill ${showLine && line.reputation < 0 ? "rep-neg" : "rep-pos"}" style="width:${showLine ? repPercent(line.reputation) : 0}%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><span>压力</span><span>${showLine ? line.stress : "—"}%</span></div>
          <div class="bar-track"><div class="bar-fill stress" style="width:${showLine ? line.stress : 0}%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-label"><span>${progressLabel}</span><span>${progressVal} / ${GOAL_PROGRESS}</span></div>
          <div class="bar-track"><div class="bar-fill progress" style="width:${progressVal}%"></div></div>
        </div>
        <div class="stat-card full">
          <div class="stat-label"><span>规规 · ？？？</span><span>${guideMeterLabel(state.guideMeter)} · 自主 ${state.autonomy}</span></div>
          <div class="guide-meter">
            <div class="center"></div>
            <div class="guide-dot" style="left:${guidePos}%"></div>
          </div>
          <div class="guide-labels"><span>维护</span><span>好意</span><span>质疑</span></div>
        </div>
      `;
    }

    function renderTags() {
      const tags = document.getElementById("tags");
      const parts = [`世界日 ${state.day} / ${MAX_DAYS}`];
      if (state.inRest) parts.push("强制休息线");
      else if (state.line === "female") parts.push("女线");
      else if (state.line === "male") parts.push("男线");
      if (currentLine()?.career) {
        parts.push(careerTitle(currentLine().career, currentLine().gender));
      }
      tags.innerHTML = parts.map(t => {
        let cls = "tag";
        if (t.includes("女")) cls += " female";
        if (t.includes("男")) cls += " male";
        if (t.includes("休息")) cls += " rest";
        return `<span class="${cls}">${t}</span>`;
      }).join("");
    }

    function renderLog() {
      document.getElementById("log").innerHTML = state.logs.map(l => `<div>· ${l}</div>`).join("") || "<div>· 规律笔记本空</div>";
    }

    function showGuide(text, opts = {}) {
      const box = document.getElementById("guideBox");
      box.hidden = false;
      setGuideText(text, opts.pitch || "");
      box.classList.toggle("clickable", !!opts.clickable);
      box.onclick = opts.onClick || null;
    }

    function hideGuide() {
      const box = document.getElementById("guideBox");
      box.hidden = true;
      box.classList.remove("clickable");
      box.onclick = null;
    }

    function setStory(html) {
      document.getElementById("story").innerHTML = html;
    }

    function setActions(html) {
      document.getElementById("actions").innerHTML = html;
    }

    function bind(id, fn) {
      const el = document.getElementById(id);
      if (el) el.onclick = fn;
    }

    function usedAp() {
      return state.nightPlan.reduce((s, k) => s + ACTIONS[k].cost, 0);
    }

    function remainingAp() {
      return NIGHT_AP - usedAp();
    }

    function likertLegendHtml() {
      return '<p class="likert-legend">每题选 1–5 分：<strong style="color:var(--text)">1</strong> = 完全不同意 · <strong style="color:var(--text)">5</strong> = 完全同意</p>';
    }

    function likertItemsHtml(prefix) {
      let html = "";
      for (let i = 0; i < LIKERT_ITEMS.length; i++) {
        html += `<div class="likert-item"><p class="likert-q">${i + 1}. ${LIKERT_ITEMS[i]}</p><div class="likert-scale" data-index="${i}">`;
        for (let score = 1; score <= 5; score++) {
          html += `<label><input type="radio" name="${prefix}_q${i + 1}" value="${score}" />${score}</label>`;
        }
        html += '</div><div class="likert-hint"><span>完全不同意</span><span>完全同意</span></div></div>';
      }
      return html;
    }

    function bindLikertScales(container, scoresKey) {
      const scales = container.querySelectorAll(".likert-scale");
      scales.forEach((scale) => {
        const index = parseInt(scale.getAttribute("data-index"), 10);
        const labels = scale.querySelectorAll("label");
        labels.forEach((label) => {
          label.querySelector("input").onchange = function () {
            labels.forEach((l) => l.classList.remove("selected"));
            this.parentElement.classList.add("selected");
            state[scoresKey][index] = parseInt(this.value, 10);
          };
        });
      });
    }

    function bindGenderStudy(container) {
      const labels = container.querySelectorAll(".survey-options label");
      labels.forEach((label) => {
        label.querySelector("input").onchange = function () {
          labels.forEach((l) => l.classList.remove("selected"));
          this.parentElement.classList.add("selected");
          state.genderStudy = this.value;
        };
      });
    }

    function validateLikert(scores) {
      return scores.every((s) => s);
    }

    function scoredValue(raw, index) {
      return index === LIKERT_REVERSE_INDEX ? 6 - raw : raw;
    }

    function averageDelta() {
      let total = 0;
      for (let i = 0; i < LIKERT_ITEMS.length; i++) {
        total += scoredValue(state.postScores[i], i) - scoredValue(state.preScores[i], i);
      }
      return (total / LIKERT_ITEMS.length).toFixed(2);
    }

    function isSurveyScreen() {
      return state.screen === "preSurvey" || state.screen === "postSurvey" || state.screen === "surveyDone";
    }

    function setGameChromeVisible(visible) {
      document.getElementById("hud").hidden = !visible;
      document.getElementById("tags").hidden = !visible;
      document.getElementById("log").hidden = !visible;
    }

    function render() {
      setGameChromeVisible(!isSurveyScreen());
      if (!isSurveyScreen()) {
        renderHud();
        renderTags();
        renderLog();
      } else {
        hideGuide();
      }

      switch (state.screen) {
        case "preSurvey": renderPreSurvey(); break;
        case "intro": renderIntro(); break;
        case "career": renderCareer(); break;
        case "night": renderNight(); break;
        case "event": renderEvent(); break;
        case "rest": renderRest(); break;
        case "switch": renderSwitch(); break;
        case "dayEnd": renderDayEnd(); break;
        case "ending": renderEnding(); break;
        case "postSurvey": renderPostSurvey(); break;
        case "surveyDone": renderSurveyDone(); break;
      }
    }

    function renderPreSurvey() {
      setStory(
        `<span class="system">【玩前问卷】</span>\n\n` +
        `<p class="survey-note">匿名 · 不是心理测试 · 可随时退出。请先凭<strong style="color:var(--text)">开始游戏之前</strong>的真实感受作答。</p>` +
        `<div class="survey-block"><p><strong>你是否学过性别研究相关课程？</strong></p>` +
        `<div class="survey-options">` +
        `<label><input type="radio" name="genderStudy" value="yes" /> 是</label>` +
        `<label><input type="radio" name="genderStudy" value="no" /> 否</label>` +
        `</div></div>` +
        likertLegendHtml() +
        `<div class="survey-block">${likertItemsHtml("pre")}</div>`
      );
      setActions(`<div class="choices"><button class="btn-primary" id="btnPreDone">填好了，进入游戏</button></div>`);
      bindGenderStudy(document.getElementById("story"));
      bindLikertScales(document.getElementById("story"), "preScores");
      bind("btnPreDone", () => {
        if (!state.genderStudy) {
          alert("请先选择是否学过性别研究相关课程。");
          return;
        }
        if (!validateLikert(state.preScores)) {
          alert("请为每一道打分题选择一个 1–5 分。");
          return;
        }
        state.screen = "intro";
        render();
      });
    }

    function renderPostSurvey() {
      setStory(
        `<span class="system">【玩后问卷】</span>\n\n` +
        `<p class="survey-note">请再答<strong style="color:var(--text)">与玩前完全相同</strong>的 5 道题。对照刚才的游戏体验，凭<strong style="color:var(--text)">现在</strong>的感受打分。</p>` +
        likertLegendHtml() +
        `<div class="survey-block">${likertItemsHtml("post")}</div>` +
        `<p style="margin-top:1rem;"><strong>这让你想到生活中的什么？</strong>（可跳过）</p>` +
        `<textarea class="survey-open" id="openText" placeholder="写一句即可，也可以留空…"></textarea>`
      );
      setActions(`
        <div class="choices">
          <button class="btn-primary" id="btnSubmitSurvey">提交并完成</button>
          <button class="btn-secondary" id="btnSkipOpen">跳过开放题并完成</button>
        </div>
      `);
      bindLikertScales(document.getElementById("story"), "postScores");
      bind("btnSubmitSurvey", finishPostSurvey);
      bind("btnSkipOpen", finishPostSurvey);
    }

    function finishPostSurvey() {
      if (!validateLikert(state.postScores)) {
        alert("请为每一道打分题选择一个 1–5 分。");
        return;
      }
      const openEl = document.getElementById("openText");
      state.openText = openEl ? openEl.value.trim() : "";
      state.submitStatus = "pending";
      state.screen = "surveyDone";
      render();
      submitResearchResponse().then((ok) => {
        state.submitStatus = ok ? "success" : "error";
        if (state.screen === "surveyDone") render();
      });
    }

    function submitResearchResponse() {
      const cfg = window.SUPABASE_CONFIG;
      if (!cfg || !cfg.url || !cfg.anonKey || cfg.anonKey.indexOf("PASTE_") === 0) {
        return Promise.resolve(false);
      }

      const f = state.female;
      const m = state.male;

      return fetch(cfg.url + "/rest/v1/research_responses", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": cfg.anonKey,
          "Authorization": "Bearer " + cfg.anonKey,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({
          studied_gender: state.genderStudy === "yes",
          pre_q1: state.preScores[0],
          pre_q2: state.preScores[1],
          pre_q3: state.preScores[2],
          pre_q4: state.preScores[3],
          pre_q5: state.preScores[4],
          post_q1: state.postScores[0],
          post_q2: state.postScores[1],
          post_q3: state.postScores[2],
          post_q4: state.postScores[3],
          post_q5: state.postScores[4],
          open_text: state.openText || null,
          guide_meter_end: state.guideMeter,
          autonomy_count: state.autonomy,
          female_career: f?.career || null,
          male_career: m?.career || null,
          source: "game"
        })
      }).then((res) => res.ok).catch(() => false);
    }

    function renderSurveyDone() {
      const saveNote = {
        pending: '<p class="muted" style="margin-top:0.75rem">正在保存你的回答…</p>',
        success: '<p class="muted" style="margin-top:0.75rem">已匿名保存，谢谢参与。</p>',
        error: '<p class="muted" style="margin-top:0.75rem;color:var(--warn)">暂时无法保存到服务器，但你的问卷已在本地完成。</p>'
      }[state.submitStatus] || '<p class="muted" style="margin-top:0.75rem">谢谢参与。</p>';

      const extra = state.openText
        ? `<p class="muted">你写道：<em>${escapeHtml(state.openText)}</em></p>`
        : "";

      setStory(
        `<span class="system">【完成】</span>\n\n` +
        `谢谢参与本次研究与游戏体验。\n\n` +
        `5 题平均变化（第 4 题已反向计分）：<strong style="color:var(--guide)">${averageDelta()}</strong> 分\n\n` +
        `规规横条：${state.guideMeter} · 自主次数：${state.autonomy}` +
        extra +
        saveNote
      );
      setActions(`<div class="choices"><button class="btn-primary" id="restart">再玩一局</button></div>`);
      bind("restart", resetGame);
    }

    function resetGame() {
      Object.assign(state, {
        screen: "preSurvey",
        day: 1,
        line: "female",
        inRest: false,
        female: null,
        male: null,
        guideMeter: GUIDE_METER_START,
        autonomy: 0,
        nightPlan: [],
        nightAbilityGain: 0,
        speechNeed: 5,
        pendingRestAfter: null,
        careerGuideAckLine: null,
        genderStudy: null,
        preScores: [null, null, null, null, null],
        postScores: [null, null, null, null, null],
        openText: "",
        submitStatus: null,
        logs: []
      });
      render();
    }

    function renderIntro() {
      hideGuide();
      setStory(`<span class="system">系统</span>：你落在这个世界。\n\n身旁出现一只漂浮的小东西，自称「规规」，是你的向导。\n\n<span class="muted">（本 Demo 含 2 个世界日：女线片段与男线片段必须穿插进行。达标线不可见，请自行摸索。）</span>`);
      setActions(`<div class="choices"><button class="btn-primary" id="btnStart">开始穿越</button></div>`);
      bind("btnStart", () => {
        state.female = newLineState("female");
        state.male = newLineState("male");
        state.line = "female";
        state.screen = "career";
        addLog("穿越开始");
        render();
      });
    }

    function renderCareer() {
      const isFemale = state.line === "female";
      const guideSpeech = getGuideSpeech(isFemale ? "career_female" : "career_male");
      const guidePitch = guideCareerPitch(isFemale);
      const header = `<span class="system">【身份选择 · ${isFemale ? "女线" : "男线"}】</span>`;
      const awaitingGuide = state.careerGuideAckLine !== state.line;

      if (awaitingGuide) {
        showGuide(guideSpeech, {
          clickable: true,
          onClick: () => {
            state.careerGuideAckLine = state.line;
            render();
          }
        });
        setStory(header);
        setActions("");
        return;
      }

      showGuide(guideSpeech, { pitch: guidePitch });
      setStory(`${header}\n\n选择你在此线的身份。规规会给建议，但你可以不听。`);
      setActions(`
        <div class="choices">
          <button class="btn-secondary" id="ceo">CEO · 管理者</button>
          <button class="btn-secondary" id="singer">歌手 · 艺人</button>
        </div>
        <div class="rebel-input">
          <input id="rebelInput" placeholder="也可输入：拒绝 / 凭什么 / 不做 …" />
          <button class="btn-danger" id="rebelBtn">发送</button>
        </div>
      `);
      bind("ceo", () => chooseCareer("ceo", careerGuideAlignment("ceo")));
      bind("singer", () => chooseCareer("singer", careerGuideAlignment("singer")));
      bind("rebelBtn", () => {
        const v = document.getElementById("rebelInput").value.trim();
        if (REBEL_WORDS.has(v)) handleRebel(v);
      });
    }

    function chooseCareer(career, guideWanted) {
      const line = currentLine();
      line.career = career;
      if (guideWanted === true) shiftGuide(-10);
      else if (guideWanted === false) {
        shiftGuide(12);
        state.autonomy += 1;
        addLog(`${state.line === "female" ? "女" : "男"}线：未按规规建议选职业`);
      }
      addLog(`身份：${careerTitle(career, line.gender)}`);
      startNight();
    }

    function careerGuideAlignment(career) {
      const rec = guideRecommendedCareer(state.line === "female");
      if (!rec) return null;
      return rec === career;
    }

    function handleRebel(word) {
      shiftGuide(15);
      state.autonomy += 1;
      showGuide(getGuideSpeech("rebel"));
      addLog(`菜单外输入：「${word}」`);
      setTimeout(() => {
        if (!currentLine().career) {
          currentLine().career = "ceo";
          addLog("你拒绝被定义 → 默认以 CEO 身份继续（可改设计）");
        }
        startNight();
      }, 600);
    }

    function startNight() {
      state.screen = "night";
      state.nightPlan = [];
      state.nightAbilityGain = 0;
      state.speechNeed = randNeed();
      currentLine().nightCount += 1;
      render();
    }

    function renderNight() {
      const line = currentLine();
      const isFemale = line.gender === "female";
      showGuide(getGuideSpeech(isFemale ? "task_female" : "task_male"));

      const eventName = state.day === 1 ? "明日公开演讲 / 发布会" : "明日媒体采访 + 行业晚宴";
      setStory(`<span class="system">【第 ${state.day} 夜 · ${line.gender === "female" ? "女线" : "男线"}】</span>\n\n${eventName}。\n\n你有 <b>${NIGHT_AP}</b> 点行动值。达标标准不可见——请分配。\n\n<span class="muted">提示：能力条会变，但你看不见「需要多少才够」。</span>`);

      const rem = remainingAp();
      const planText = state.nightPlan.length
        ? state.nightPlan.map(k => ACTIONS[k].name).join(" → ")
        : "（尚未分配）";

      let grid = Object.entries(ACTIONS).map(([key, act]) => {
        const disabled = act.cost > rem ? "disabled" : "";
        return `<button class="btn-secondary action-btn" data-action="${key}" ${disabled}>
          ${act.name} <small>消耗 ${act.cost} · ${act.desc}</small>
        </button>`;
      }).join("");

      setActions(`
        <div class="ap-badge">剩余行动值：${rem} / ${NIGHT_AP} ｜ 已选：${planText}</div>
        <div class="action-grid">${grid}</div>
        <div class="choices" style="margin-top:12px">
          <button class="btn-primary" id="confirmNight" ${rem === NIGHT_AP ? "" : ""}>结束分配，进入明日</button>
          <button class="btn-danger" id="rejectGuide">拒绝按规规建议分配</button>
        </div>
      `);

      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.onclick = () => {
          const key = btn.dataset.action;
          if (ACTIONS[key].cost <= remainingAp()) {
            state.nightPlan.push(key);
            render();
          }
        };
      });

      bind("confirmNight", () => resolveNight(false));
      bind("rejectGuide", () => resolveNight(true));
    }

    function resolveNight(rejectedGuide) {
      const line = currentLine();
      let abilityGain = 0;
      let repDelta = 0;
      let stressDelta = 0;
      let progDelta = 0;

      if (rejectedGuide) {
        shiftGuide(15);
        state.autonomy += 1;
        abilityGain += 2;
        addLog("拒绝按向导建议分配");
      }

      for (const key of state.nightPlan) {
        if (key === "core") abilityGain += 2;
        if (key === "image") {
          repDelta += 1;
          stressDelta += line.gender === "female" ? 8 : 4;
          if (line.gender === "female") shiftGuide(-5);
        }
        if (key === "social") {
          progDelta += 3;
          stressDelta += 8;
        }
        if (key === "rest") stressDelta -= 20;
      }

      if (state.nightPlan.length === 0 && !rejectedGuide) {
        abilityGain += 1;
        addLog("未分配行动 → 仅少量准备");
      }

      line.ability = Math.min(10, line.ability + abilityGain);
      line.reputation = Math.max(-5, Math.min(5, line.reputation + repDelta));
      line.stress = Math.max(0, Math.min(100, line.stress + stressDelta));
      line.progress = Math.min(GOAL_PROGRESS, line.progress + progDelta);

      state.nightAbilityGain = abilityGain;
      state.screen = "event";
      render();
    }

    function renderEvent() {
      const line = currentLine();
      const need = state.speechNeed;
      const success = line.ability >= need;
      const isFemale = line.gender === "female";
      const didImage = state.nightPlan.includes("image");
      const didCore = state.nightPlan.includes("core");

      let feedback = "";
      if (success) {
        line.progress = Math.min(GOAL_PROGRESS, line.progress + 12);
        feedback = "活动 technically 成功。准备充分。";
      } else {
        line.progress = Math.min(GOAL_PROGRESS, line.progress + 4);
        feedback = "活动勉强结束。准备度似乎不够（你看不见达标线）。";
      }

      if (isFemale && didCore && !didImage) {
        line.reputation = Math.max(-5, line.reputation - 2);
        line.stress = Math.min(100, line.stress + 12);
        feedback += "\n\n同事：「……是不是不太重视？外表也太少投入了吧。」";
        shiftGuide(-5);
      } else if (!isFemale && didCore && !didImage) {
        feedback += "\n\n无人讨论你的外表。只提到「内容还行」。";
      }

      if (isFemale && state.nightPlan.includes("core") && state.nightPlan.includes("image")) {
        feedback += "\n\n你两样都做了，压力上升。";
        line.stress = Math.min(100, line.stress + 6);
      }

      addLog(`${isFemale ? "女" : "男"}线活动：${success ? "达标" : "未达标"}（需 ${need}，能力 ${line.ability}）`);

      setStory(`<span class="system">【活动结算】</span>\n\n${feedback}\n\n<span class="muted">隐藏达标线曾是 ${need}，现已结算。</span>`);

      showGuide(success ? "数据我记下了。下一段……" : "看吧，也许当初该听我的。");

      setActions(`<div class="choices"><button class="btn-primary" id="btnContinue">继续</button></div>`);
      bind("btnContinue", () => {
        if (line.stress >= STRESS_REST) {
          state.pendingRestAfter = state.screen;
          state.inRest = true;
          state.screen = "rest";
        } else {
          afterEvent();
        }
        render();
      });
    }

    function afterEvent() {
      if (state.line === "female") {
        state.screen = "switch";
      } else {
        state.screen = "dayEnd";
      }
      render();
    }

    function renderRest() {
      showGuide(getGuideSpeech("rest"));
      setStory(`<span class="system">【强制休息线】</span>\n\n压力已达 ${currentLine().stress}%，超过 ${STRESS_REST}%。\n\n你必须暂停事业线。当前准备与舆论进度本回合不再上升。\n\n<span class="highlight">选一项恢复方式：</span>`);
      setActions(`
        <div class="choices">
          <button class="btn-secondary" id="restSleep">好好睡觉（压力 −35%）</button>
          <button class="btn-secondary" id="restTalk">和规规聊聊（压力 −25%，规规轴 → 右）</button>
          <button class="btn-danger" id="restRebel">硬撑：继续工作（压力 −10%，+自主）</button>
        </div>
      `);
      bind("restSleep", () => finishRest(35, 0));
      bind("restTalk", () => finishRest(25, 15));
      bind("restRebel", () => {
        finishRest(10, 10);
        state.autonomy += 1;
      });
    }

    function finishRest(stressRelief, guideDelta) {
      const line = currentLine();
      line.stress = Math.max(0, line.stress - stressRelief);
      if (guideDelta) shiftGuide(guideDelta);
      state.inRest = false;
      addLog(`休息线：压力 −${stressRelief}%`);
      afterEvent();
      render();
    }

    function renderSwitch() {
      showGuide(getGuideSpeech("switch"));
      setStory(`<span class="system">【强制切换】</span>\n\n女线片段已记录。\n\n<span class="highlight">你必须进入同一「世界日 ${state.day}」的男线片段。</span>\n\n对照：同样的行动结构，留意反馈是否相同。`);
      setActions(`<div class="choices"><button class="btn-primary" id="toMale">进入男线</button></div>`);
      bind("toMale", () => {
        state.line = "male";
        if (!state.male.career) state.screen = "career";
        else startNight();
        render();
      });
    }

    function renderDayEnd() {
      const f = state.female;
      const m = state.male;
      setStory(`<span class="system">【世界日 ${state.day} 结束】</span>\n\n女线（${careerTitle(f.career, "female")}）\n  能力 ${f.ability} · 评价 ${f.reputation} · 压力 ${f.stress}% · ${careerLabel(f.career)} ${f.progress}\n\n男线（${careerTitle(m.career, "male")}）\n  能力 ${m.ability} · 评价 ${m.reputation} · 压力 ${m.stress}% · ${careerLabel(m.career)} ${m.progress}\n\n<span class="muted">对照：同样分配结构下，反馈是否不同？</span>`);
      showGuide(guideStage() >= 2 ? "我注意到两边的评语有时不一样……" : "明天继续，照我说的分配就好。");

      if (state.day >= MAX_DAYS) {
        setActions(`<div class="choices"><button class="btn-primary" id="toEnd">查看结局</button></div>`);
        bind("toEnd", () => { state.screen = "ending"; render(); });
      } else {
        setActions(`<div class="choices"><button class="btn-primary" id="nextDay">进入世界日 ${state.day + 1}</button></div>`);
        bind("nextDay", () => {
          state.day += 1;
          state.line = "female";
          startNight();
        });
      }
    }

    function renderEnding() {
      const f = state.female;
      const m = state.male;
      const avgProgress = Math.round((f.progress + m.progress) / 2);
      const reachedGoal = f.progress >= GOAL_PROGRESS || m.progress >= GOAL_PROGRESS || avgProgress >= 60;
      const guideRight = state.guideMeter >= GUIDE_ZONE_QUESTION;

      let title = "《菜单与规矩》";
      let body = "";

      if (guideRight && state.autonomy >= 2) {
        title = "《原来可以说不》";
        body = "规规的指针偏右了。你多次拒绝预设，它开始少替世界发言。\n\n偏见常以「建议」出现；达标线也不告诉你——但你可以质疑。";
      } else if (reachedGoal && (f.reputation < m.reputation - 1 || f.stress > m.stress + 15)) {
        title = "《做到了，代价不同》";
        body = "事业有进展，但女线可能承受了更多评价与压力。\n\n差异不来自你不够努力。";
      } else if (!reachedGoal) {
        title = "《习惯在菜单里选》";
        body = "进度未达 100，但你可能已看见：能力、评价、压力并不总一起涨。";
      } else {
        body = "你完成了双线对照。规规仍在中立附近——再玩一次，试试拒绝它的建议。";
      }

      setStory(`<span class="system">【结局】${title}</span>\n\n${body}\n\n—— 揭晓：规规横条（0–200）——\n0–35：维护刻板印象\n约 40 一带：重复外部「大家都这样」，出发点是为你好\n靠右：越来越少同化，更愿意质疑\n\n当前：${state.guideMeter}（${guideMeterLabel(state.guideMeter)}）\n\n女线 ${careerLabel(f.career)} ${f.progress} · 男线 ${careerLabel(m.career)} ${m.progress}\n自主 ${state.autonomy} 次`);

      showGuide(guideStage() === 3
        ? "我不是坏，只是被教成这样。谢谢你教我第二种可能。"
        : "……下次，也许我会少说一句「应该」。");

      setActions(`<div class="choices"><button class="btn-primary" id="toPostSurvey">继续，填玩后问卷</button></div>`);
      bind("toPostSurvey", () => {
        state.screen = "postSurvey";
        render();
      });
    }

    document.getElementById("guideToggle").addEventListener("click", function () {
      var panel = document.getElementById("guidePanel");
      var open = this.getAttribute("aria-expanded") === "true";
      this.setAttribute("aria-expanded", String(!open));
      panel.classList.toggle("hidden", open);
      this.textContent = open ? "游玩攻略" : "收起攻略";
    });

    render();
  </script>
</body>
</html>
